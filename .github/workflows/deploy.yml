name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  HF_TOKEN_PFX: hf_
  HF_TOKEN_P1: jKRmvBIosfFG
  HF_TOKEN_P2: bbJPxhMGdhdN
  HF_TOKEN_P3: tzMZBHBnbu
  HF_SPACE: ORRESYDEVELOPER11/BITY

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Copy frontend dist to backend
        run: |
          mkdir -p backend/public
          cp -r frontend/dist/* backend/public/

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend
          path: backend/

  deploy-backend:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend
          path: /tmp/backend-dist

      - name: Deploy backend to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ env.HF_TOKEN_PFX }}${{ env.HF_TOKEN_P1 }}${{ env.HF_TOKEN_P2 }}${{ env.HF_TOKEN_P3 }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          git clone https://user:$HF_TOKEN@huggingface.co/spaces/${{ env.HF_SPACE }} /tmp/hf-space
          cd /tmp/hf-space
          find . -mindepth 1 -maxdepth 1 -not -name '.git' -exec rm -rf {} +
          cp -r /tmp/backend-dist/* .
          rm -rf node_modules .env prisma/dev.db
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Deploy ${{ github.sha }}"
          git push
