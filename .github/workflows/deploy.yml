name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  HF_TOKEN_PFX: hf_
  HF_TOKEN_P1: kCAbLbEAYWzm
  HF_TOKEN_P2: PMnhkVSfHhR
  HF_TOKEN_P3: decXIXCYiHg
  HF_SPACE: ORRESYDEVELOPER11/BITY

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Copy frontend dist to backend
        run: |
          mkdir -p backend/public
          cp -r frontend/dist/* backend/public/

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend
          path: backend/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-backend:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend

      - name: Deploy backend to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ env.HF_TOKEN_PFX }}${{ env.HF_TOKEN_P1 }}${{ env.HF_TOKEN_P2 }}${{ env.HF_TOKEN_P3 }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          git clone https://user:$HF_TOKEN@huggingface.co/spaces/${{ env.HF_SPACE }} hf-space
          cd hf-space
          rm -rf ./*
          cp -r ../* .
          rm -rf node_modules .env
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Deploy ${{ github.sha }}"
          git push
