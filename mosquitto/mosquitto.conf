# Trust Market Mosquitto MQTT Broker Configuration

# Listen on default MQTT port
listener 1883 0.0.0.0

# Allow anonymous connections for LAN use
allow_anonymous true

# Authentication (uncomment for production)
# password_file mosquitto\passwd

# Persistence
persistence true
persistence_location mosquitto\data

# Logging
log_dest file mosquitto\mosquitto.log
log_dest stdout
connection_messages true
log_timestamp true
